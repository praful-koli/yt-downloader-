services:
  - type: web
    name: ytgrab-helper
    runtime: node
    plan: free
    buildCommand: >
      npm install &&
      pip install -U "yt-dlp[default]" &&
      echo "node path:" && which node &&
      echo "yt-dlp version:" && yt-dlp --version &&
      echo "Build complete!"
    startCommand: node server.js
    envVars:
      - key: RENDER
        value: "true"
      - key: NODE_ENV
        value: production