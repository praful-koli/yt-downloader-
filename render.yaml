services:
  - type: web
    name: ytgrab-helper
    runtime: node
    plan: free
    buildCommand: npm install && pip install yt-dlp
    startCommand: node server.js
    envVars:
      - key: RENDER
        value: true
      - key: NODE_ENV
        value: production
services:
  - type: web
    name: ytgrab-helper
    runtime: node
    plan: free
    buildCommand: npm install && pip install -U yt-dlp && yt-dlp --version
    startCommand: node server.js
    envVars:
      - key: RENDER
        value: "true"
      - key: NODE_ENV
        value: production