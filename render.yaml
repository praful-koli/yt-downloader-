services:
  - type: web
    name: ytgrab-helper
    runtime: node
    plan: free
    buildCommand: >
      npm install &&
      pip install -U "yt-dlp[default]" &&
      pip install -U yt-dlp-ejs &&
      yt-dlp --version &&
      node --version &&
      echo "yt-dlp-ejs installed:" && python3 -c "import yt_dlp_ejs; print('OK')" 2>/dev/null || echo "yt-dlp-ejs check done" &&
      echo "Build complete!"
    startCommand: node server.js
    envVars:
      - key: RENDER
        value: "true"
      - key: NODE_ENV
        value: production