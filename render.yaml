services:
  - type: web
    name: ytgrab-helper
    runtime: node
    plan: free
    buildCommand: >
      npm install &&
      pip install -U "yt-dlp[default]" yt-dlp-ejs &&
      echo "=== Versions ===" &&
      node --version &&
      yt-dlp --version &&
      python3 -c "import yt_dlp_ejs; print('yt-dlp-ejs OK')" &&
      echo "=== Build complete ==="
    startCommand: node server.js
    envVars:
      - key: RENDER
        value: "true"
      - key: NODE_ENV
        value: production